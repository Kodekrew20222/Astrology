<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Astrology AI - Onboarding</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="mb-3">Enter Your Birth Details</h3>

    <form id="userForm">
      <input class="form-control mb-3" type="text" id="name" placeholder="Name" required>
      <input class="form-control mb-3" type="date" id="dob" required>
      <input class="form-control mb-3" type="time" id="time" required>
      <input class="form-control mb-3" type="text" id="place" placeholder="Birth Place" required>

      <button class="btn btn-primary w-100">Save & Continue</button>
    </form>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="successModal">
  <div class="modal-dialog">
    <div class="modal-content p-4 text-center">
      <h4>✅ Data Saved Successfully</h4>
      <button class="btn btn-success mt-3" id="goChat">Continue</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
