<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Astrology Assistant</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f8fafc; }
    .card { border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.05); }
    .mic-btn {
      width:70px; height:70px; border-radius:50%;
      font-size:22px; border:none;
      background:linear-gradient(135deg,#ef4444,#f97316);
      color:white;
    }
  </style>
</head>

<body>
<div class="container py-5">

  <h2 class="text-center mb-4">🔮 Astrology Assistant</h2>

  <div class="card p-4 mb-4">
    <h5>User Details</h5>

    <label>Name</label>
    <input id="name" class="form-control mb-2">

    <label>DOB</label>
    <input id="dob" type="date" class="form-control mb-2">

    <label>Time</label>
    <input id="time" type="time" class="form-control mb-2">

    <label>Location</label>
    <input id="location" class="form-control mb-3">

    <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
  </div>

  <div class="text-center">
    <button class="mic-btn" onclick="startListening()">🎤</button>
    <p id="status" class="mt-2">Click mic to speak</p>
  </div>

  <div class="card p-4 mt-4">
    <h5>Response</h5>
    <p id="responseText"></p>
  </div>

</div>

<script src="./script.js"></script>
</body>
</html>
